<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kali Linux Terminal</title>

<style>

body{
margin:0;
background:black;
color:#00ff00;
font-family:monospace;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
}

#terminal{
position:absolute;
top:20px;
left:20px;
z-index:2;
}

#flash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:red;
opacity:0;
pointer-events:none;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="flash"></div>

<div id="terminal">
<pre id="out"></pre>
</div>

<script>

/* MATRIX BACKGROUND */

let canvas=document.getElementById("matrix")
let ctx=canvas.getContext("2d")

canvas.height=window.innerHeight
canvas.width=window.innerWidth

let letters="01ABCDEFGHIJKLMNOPQRSTUVWXYZ"
letters=letters.split("")

let fontSize=14
let columns=canvas.width/fontSize

let drops=[]

for(let x=0;x<columns;x++)
drops[x]=1

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#0f0"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)]

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0

drops[i]++

}

}

setInterval(draw,33)

/* TERMINAL AUTO RUN */

let out=document.getElementById("out")
let flash=document.getElementById("flash")

function randomIP(){
return "192.168."+Math.floor(Math.random()*255)+"."+Math.floor(Math.random()*255)
}

function startHack(){

out.innerHTML+="Booting Kali Linux...\n"
out.innerHTML+="Initializing network tools...\n\n"

let scan=setInterval(()=>{

out.innerHTML+="Scanning "+randomIP()+" ... OPEN\n"

window.scrollTo(0,document.body.scrollHeight)

},120)

setTimeout(()=>{

clearInterval(scan)

out.innerHTML+="\nACCESS GRANTED ✔\n"

flash.style.opacity="0.7"

setTimeout(()=>{
flash.style.opacity="0"
},200)

setInterval(()=>{

out.innerHTML+=
"Bypassing firewall...\n"+
"Decrypting root password...\n"+
"Uploading exploit...\n"+
"Root access confirmed...\n\n"

window.scrollTo(0,document.body.scrollHeight)

},150)

},4000)

}

window.onload=startHack

</script>

</body>
</html>
