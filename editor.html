<!DOCTYPE html>
<html>
<head>
<title>AdiXfusion Code Editor</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
padding:20px;
}

h1{
color:#38bdf8;
}

.editor{
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
}

textarea{
width:95%;
height:400px;
border-radius:8px;
padding:15px;
font-size:16px;
resize:vertical;
border:none;
outline:none;
}

button{
padding:12px 25px;
background:#38bdf8;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#0ea5e9;
}

iframe{
width:95%;
height:500px;
background:white;
border-radius:8px;
border:none;
}

</style>

</head>

<body>

<h1>AdiXfusion Live Code Editor</h1>

<div class="editor">

<textarea id="code">
<!DOCTYPE html>
<html>
<body>

<h2>Hello AdiXfusion</h2>
<p>Write your HTML code here</p>

</body>
</html>
</textarea>

<button onclick="runCode()">Run Code</button>

<iframe id="preview"></iframe>

</div>

<script>
function runCode(){
var code=document.getElementById("code").value;
document.getElementById("preview").srcdoc=code;
}
</script>

</body>
</html>
